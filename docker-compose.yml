version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: askthepaper_backend
    ports:
      - "8000:8000"
    environment:
      # Use host.docker.internal to talk to the MongoDB running on your machine
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - DATABASE_NAME=askthepaper
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    # This allows the container to resolve 'host.docker.internal' on Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - askthepaper_network
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: askthepaper_admin
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - askthepaper_network
    restart: unless-stopped

networks:
  askthepaper_network:
    driver: bridge
