version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: askthepaper_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # loads GEMINI_API_KEY, OPENAI_API_KEY, GROQ_API_KEY, ANTHROPIC_API_KEY, etc.
    environment:
      # Override the MONGODB_URL from .env — inside Docker we use host.docker.internal, not localhost
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - DATABASE_NAME=askthepaper
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    # This allows the container to resolve 'host.docker.internal' on Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Mount the uploads directory so PDFs persist across container restarts.
    # Without this, every `docker compose up` would lose all uploaded files
    # and the backend would return 404 "Physical file missing" on process.
    volumes:
      - uploads_data:/app/uploads
      - huggingface_cache:/root/.cache/huggingface # persist model so it never re-downloads
    networks:
      - askthepaper_network
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: askthepaper_admin
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - askthepaper_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: askthepaper_frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    networks:
      - askthepaper_network
    restart: unless-stopped

networks:
  askthepaper_network:
    driver: bridge

# Named volumes: persist data across container restarts/rebuilds.
volumes:
  uploads_data:
  huggingface_cache: # persists the embedding model across container restarts
